{% extends 'venuste/base.html' %}

{% block title %}Password Updated - Venuste{% endblock %}

{% block content %}
<div class="view-stack" style="text-align: center;">
    <h1 style="color: #22c55e; background: none; -webkit-text-fill-color: #22c55e;">Password Updated</h1>
    <p class="subtitle">Your new password is active.</p>

    <div class="success-panel">
        <p style="color: #15803d; margin: 0; line-height: 1.35; font-size: 0.85rem;">
            Password change completed successfully.
        </p>
    </div>

    <div class="action-grid" style="grid-template-columns: 1fr;">
        <a href="{% url 'venuste:dashboard' %}" class="action-link primary">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
