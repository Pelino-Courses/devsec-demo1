{% extends 'venuste/base.html' %}

{% block title %}Password Updated - Venuste{% endblock %}

{% block content %}
<div class="view-stack" style="text-align:center;">
    <h1>Password Updated</h1>
    <p class="subtitle">Your password has been changed successfully. You can now sign in with the new password.</p>
    <div class="action-grid" style="grid-template-columns: 1fr;">
        <a href="{% url 'venuste:login' %}" class="action-link primary">Go to Sign In</a>
    </div>
</div>
{% endblock %}
